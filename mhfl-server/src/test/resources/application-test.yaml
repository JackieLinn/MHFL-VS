server:
  port: 8088

web:
  upload:
    base-dir: mhfl-server/uploads

app:
  base-url: http://localhost:8088

spring:
  datasource:
    url: jdbc:h2:mem:mhfl_server_it;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  security:
    jwt:
      key: abcdefghijk
  mail:
    host: smtp.example.com
    username: 12345678@example.com
    password: 12345678
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: 12345678
  rabbitmq:
    addresses: localhost
    username: root
    password: 12345678
    virtual-host: /
  docker:
    compose:
      enabled: false

springdoc:
  swagger-ui:
    path: /doc/ui
  api-docs:
    path: /doc/json

python:
  fastapi:
    url: http://localhost:8000

assistant:
  stream:
    emitter-timeout-ms: 900000
    connect-timeout-ms: 10000
    response-timeout-ms: 900000
    read-timeout-seconds: 900
    write-timeout-seconds: 120

logging:
  level:
    root: warn
